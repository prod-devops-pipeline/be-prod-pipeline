name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # Stage 1: Install Dependencies
  # ==========================================
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

  # ==========================================
  # Stage 2: Lint
  # ==========================================
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # ==========================================
  # Stage 3: Test
  # ==========================================
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test -- --runInBand

  # ==========================================
  # Stage 4: Build Application
  # ==========================================
  build:
    name: Build TypeScript Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

  # ==========================================
  # Stage 5: Build and Push Docker Image
  # ==========================================
  docker-build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build

    # Only push Docker images when code is pushed to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/securebackend:latest
            ${{ secrets.DOCKER_USERNAME }}/securebackend:${{ github.sha }}

  # ==========================================
  # Stage 6: Trigger Render Deployment
  # ==========================================
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    needs: docker-build

    # Only deploy when code is pushed to main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"