name: CI/CD and Infrastructure Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ==========================================
  # CI STAGE: Code Quality & Testing
  # ==========================================
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Jest Tests
        run: npm test -- --runInBand

      - name: Build Project
        run: npm run build

  # ==========================================
  # ARTIFACT STAGE: Docker Build
  # ==========================================
  docker-build:
    name: Build & Registry Push
    runs-on: ubuntu-latest
    needs: ci # Waits for CI to pass completely

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: DOCKER_BUILDKIT=1 docker build -t securebackend:latest .
        
      # Enterprise note: You would add login and push steps here to send 
      # the image to a container registry like DockerHub, AWS ECR, or GitHub Packages.

  # ==========================================
  # CD STAGE: Terraform Infrastructure
  # ==========================================
  terraform:
    name: Terraform Infrastructure
    runs-on: ubuntu-latest
    needs: docker-build # Waits for Docker image build to succeed

    defaults:
      run:
        working-directory: terraform

    env:
      TF_VAR_render_api_key: ${{ secrets.RENDER_API_KEY }}
      TF_VAR_render_owner_id: ${{ secrets.RENDER_OWNER_ID }}
      TF_VAR_github_repo: ${{ secrets.REPO_URL }}
      TF_VAR_branch: ${{ secrets.BRANCH }}
      TF_VAR_port: ${{ secrets.PORT }}
      TF_VAR_database_name: ${{ secrets.DATABASE_NAME }}
      TF_VAR_mongodb_uri: ${{ secrets.MONGODB_URI }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_jwt_expires_in: ${{ secrets.JWT_EXPIRES_IN }}
      TF_VAR_jwt_token_name: ${{ secrets.JWT_TOKEN_NAME }}
      TF_VAR_salt_rounds: ${{ secrets.SALT_ROUNDS }}
      TF_VAR_service_name: ${{ secrets.SERVICE_NAME }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Plan
        run: terraform plan

      # Only executes on merges/pushes to the main branch
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve
