# .github/workflows/ci.yml
# Multi-stage CI pipeline with dependency caching
# Stage order:
# 1. install -> install dependencies and cache npm packages
# 2. lint    -> run ESLint
# 3. test    -> run Jest tests
# 4. build   -> compile TypeScript project

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # Stage 1: Install dependencies
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

  # Stage 2: Lint
  lint:
    name: Run ESLint
    runs-on: ubuntu-latest
    needs: install

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

  # Stage 3: Test
  test:
    name: Run Jest Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test -- --runInBand

  # Stage 4: Build
  build:
    name: Build TypeScript Application
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js with npm Cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build